<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cross-Math Puzzle</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Wood-grain background layer (rotates to landscape on wide screens) -->
    <div class="wood-bg" aria-hidden="true"></div>

    <!-- Level complete / success modal -->
    <div id="success-modal" class="modal-overlay">
        <div class="success-card">
            <img class="success-card__bg" src="assets/backgrounds/level-complete-card.svg" alt="" aria-hidden="true">
            <div class="success-card__confetti-clip" aria-hidden="true">
                <img class="success-card__confetti" src="assets/backgrounds/confetti.svg" alt="">
            </div>
            <div class="success-card__content">
                <img class="success-card__tick" src="assets/icons/tick-mark.svg" alt="">
                <img class="success-card__crown" src="assets/icons/doodle-crown.svg" alt="">
                <h2 class="success-card__title">LEVEL<br>COMPLETE!</h2>
                <p class="success-card__subtitle">Great job!</p>
                <button id="next-level-btn" class="success-card__btn success-card__btn--primary">NEXT LEVEL</button>
                <button id="play-again-btn" class="success-card__btn success-card__btn--secondary">REPLAY</button>
            </div>
        </div>
    </div>


    <div class="app-wrapper">
        <div class="container">
            <!-- HOME SCREEN: logo + puzzle art + CTAs -->
            <div id="home-content">
                <div class="title-container">
                    <img id="title-logo" src="assets/logos/crossmath-new-logo.png" alt="CrossMath Puzzle">
                </div>

                <div class="home-art-container">
                    <img id="home-puzzle-art" src="assets/mainMenu-puzzle-art.png" alt="CrossMath puzzle art">
                </div>

                <div class="home-cta-group is-loading">
                    <div class="home-loading" role="status" aria-live="polite">
                        <span class="home-loading__spinner" aria-hidden="true"></span>
                        <span class="home-loading__text">Syncing data&hellip;</span>
                    </div>
                    <button id="play-now-btn" class="doodle-btn doodle-btn--primary">
                        <span class="doodle-btn__icon">
                            <img src="assets/icons/doddle-right-pointing-triangle.svg" alt="">
                        </span>
                        <span>PLAY NOW</span>
                    </button>
                    <button id="how-to-play-btn" class="doodle-btn doodle-btn--secondary">
                        <span>HOW TO PLAY</span>
                    </button>
                </div>
            </div>

            <!-- SELECT MODE SCREEN: difficulty selection -->
            <div id="start-content">
                <div class="start-header">
                    <button id="mode-back-btn" class="icon-btn doodle-icon-btn" aria-label="Back">
                        <img class="doodle-back-icon" src="assets/icons/doddle-right-pointing-triangle.svg" alt="">
                    </button>
                    <h2 class="screen-title">SELECT MODE</h2>
                </div>
                <!-- Hidden elements retained for existing JS hooks -->
                <div class="visually-hidden">
                    <h2 id="welcome-message">Welcome!</h2>
                    <p id="player-level-info">Ready to solve some puzzles?</p>
                    <button id="info-btn"></button>
                </div>
                <div class="difficulty-selector">
                    <!-- Existing difficulty buttons remain unchanged (IDs preserved for JS) -->
                    <button id="easy-btn" class="difficulty-btn doodle-btn">
                        <span>EASY</span>
                    </button>
                    <button id="medium-btn" class="difficulty-btn doodle-btn" disabled>
                        <span>MEDIUM</span>
                        <svg class="lock-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <path
                                d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z" />
                        </svg>
                    </button>
                    <button id="hard-btn" class="difficulty-btn doodle-btn" disabled>
                        <span>HARD</span>
                        <svg class="lock-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <path
                                d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- LEVEL SELECTOR SCREEN: grid of levels for the chosen difficulty -->
            <div id="level-content">
                <div class="start-header">
                    <button id="level-back-btn" class="icon-btn doodle-icon-btn" aria-label="Back">
                        <img class="doodle-back-icon" src="assets/icons/doddle-right-pointing-triangle.svg" alt="">
                    </button>
                    <h2 class="screen-title" id="level-screen-title">EASY</h2>
                </div>
                <div id="level-grid"></div>
                <button id="continue-level-btn" class="doodle-btn doodle-btn--primary continue-level-btn">
                    <span>CONTINUE LEVEL 1</span>
                </button>
            </div>

            <!-- Game content -->
            <div id="game-content">
                <div class="game-header start-header">
                    <button id="back-btn" class="icon-btn doodle-icon-btn" aria-label="Back">
                        <img class="doodle-back-icon" src="assets/icons/doddle-right-pointing-triangle.svg" alt="">
                    </button>
                    <h2 class="screen-title" id="level-display">LEVEL 1</h2>
                    <span id="difficulty-display">Easy</span>
                </div>

                <div class="game-play-area">
                    <div id="puzzle-container">
                        <div id="crossword-grid"></div>
                    </div>

                    <div id="number-bank-container">
                        <h2>Numbers</h2>
                        <div id="number-bank"></div>
                    </div>
                </div>

                <div class="game-footer">
                    <button id="clear-btn" class="game-action-btn">
                        <img class="action-icon" src="assets/icons/undo-vector.svg" alt="">
                        <span>UNDO</span>
                    </button>
                    <button id="reset-btn" class="game-action-btn">
                        <img class="action-icon" src="assets/icons/clear-eraser-vector.svg" alt="">
                        <span>CLEAR</span>
                    </button>
                </div>
            </div>

            <!-- HOW TO PLAY: interactive tutorial screen (on the page, like other screens) -->
            <div id="tutorial-content">
                <div class="start-header">
                    <button id="tutorial-close-btn" class="icon-btn doodle-icon-btn" aria-label="Back">
                        <img class="doodle-back-icon" src="assets/icons/doddle-right-pointing-triangle.svg" alt="">
                    </button>
                    <h2 class="screen-title">HOW TO PLAY</h2>
                </div>

                <div class="tutorial__banner">
                    <span id="tutorial-banner-text">Pick the right number</span>
                </div>

                <div class="tutorial__board">
                    <div class="tutorial-grid" id="tutorial-grid"></div>
                    <img id="tutorial-finger" class="tutorial-finger" src="assets/icons/finger-icon.svg" alt="" aria-hidden="true">
                    <div class="tutorial__confetti-clip" aria-hidden="true">
                        <img class="tutorial__confetti" src="assets/backgrounds/confetti.svg" alt="">
                    </div>
                </div>

                <div class="tutorial__bank-wrap">
                    <div class="tutorial-bank" id="tutorial-bank"></div>
                </div>

                <button id="tutorial-next-btn" class="doodle-btn doodle-btn--primary tutorial__next">
                    <span id="tutorial-next-text">NEXT</span>
                </button>
            </div>
        </div>
    </div>

    <div id="debug-panel" class="debug-panel">
        <div class="debug-header">
            <h3>Debug Mode</h3>
            <button id="toggle-debug-btn" class="icon-btn">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z" />
                </svg>
            </button>
        </div>
        <div class="debug-content">
            <div class="level-jump-section">
                <h4>Jump to Level:</h4>
                <div class="level-input-group">
                    <input type="number" id="level-input" min="1" max="20" value="1">
                    <button id="jump-level-btn" class="debug-btn">Go</button>
                </div>
            </div>
            <div class="quick-actions">
                <button id="validate-grid-btn" class="debug-btn">Validate Grid</button>
                <button id="reset-progress-btn" class="debug-btn danger">Reset Progress</button>
            </div>
        </div>
    </div>

    <!-- Analytics Bridge -->
    <script src="analytics/analytics-bridge.js?v=2"></script>
    
    <!-- Progress System -->
    <script src="progress files/config.js"></script>
    <script src="progress files/validator.js"></script>
    <script src="progress files/storageManager.js"></script>
    <script src="progress files/progressBridge.js"></script>
    <script src="progress files/gameManager.js"></script>
    
    <!-- Main Game Script -->
    <script src="script.js?v=levelwise-20260706"></script>
</body>

</html>
